name: Deploy Jupyter Book to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Jupyter Book
        run: pip install jupyter-book

      - name: Show files
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== _config.yml ==="
          cat _config.yml
          echo "=== _toc.yml ==="
          cat _toc.yml
          echo "=== Notebooks ==="
          find notebooks -name "*.ipynb" | wc -l

      - name: Build the book
        run: jupyter-book build . --all -v

      - name: Verify build output
        run: |
          if [ ! -d "_build/html" ]; then
            echo "ERROR: _build/html does not exist!"
            exit 1
          fi
          echo "Build produced $(find _build/html -name '*.html' | wc -l) HTML files"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
